<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Thank You — Earthed Energy</title>
    <link rel="icon" type="image/png" href="images/logo-energy.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Instrument+Serif&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #1A0D1F;
            color: #F5F0F0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background-color: #3A1F3F;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 48px;
            max-width: 560px;
            text-align: center;
        }
        h1 {
            font-family: 'Instrument Serif', Georgia, serif;
            font-style: italic;
            font-weight: 400;
            font-size: 2rem;
            color: #FFFFFF;
            margin-bottom: 16px;
        }
        p {
            color: #C9B8C9;
            line-height: 1.7;
            margin-bottom: 16px;
        }
        .phone {
            margin-top: 24px;
            font-size: 0.95rem;
        }
        .phone a {
            color: #E8A838;
            text-decoration: none;
            font-weight: 600;
        }
        .phone a:hover { color: #F0B848; }
        .btn {
            display: inline-block;
            margin-top: 32px;
            padding: 14px 32px;
            background-color: #E8A838;
            color: #1A0D1F;
            font-weight: 600;
            font-size: 1rem;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background-color: #F0B848;
            transform: scale(1.02);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Assessment Request Received</h1>
        <p>Thank you for getting in touch. We'll review your property details and be in contact within one business day.</p>
        <p class="phone">In the meantime, feel free to call us at <a href="tel:0433839284">0433 839 284</a></p>
        <a href="/" class="btn">Back to Earthed Energy</a>
    </div>
</body>
</html>
